[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
; Librerías necesarias (se descargarán solas)
lib_deps =
    robtillaart/PCF8574 @ ^0.4.1
    pangodream/ESP2SOTA @ ^1.0.2
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    arduino-libraries/Ethernet @ ^2.0.2

; Configuración de particiones (útil si el código crece mucho)
board_build.partitions = huge_app.csv

build_flags =
    -I include

; -----------------------------------------------------------------------------
; Entorno nativo para tests unitarios de lógica pura (PID, mediana, etc.).
; Ejecutar con: pio test -e native
; -----------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -I include
    -I test/mocks
